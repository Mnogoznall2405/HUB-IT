<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#121a25" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HUB-IT" />
    <style>
      html, body, #root {
        min-height: 100%;
        margin: 0;
        background: #f5f7fa;
      }
    </style>
    <script>
      (function () {
        var retryKey = 'hubit:static-asset-retry';
        var retryDelayMs = 250;

        function isStaticAssetUrl(value) {
          try {
            var url = new URL(String(value || ''), window.location.origin);
            return url.origin === window.location.origin
              && /^\/assets\/.+\.(js|css)$/i.test(url.pathname);
          } catch (error) {
            return false;
          }
        }

        function retryOnce(assetUrl) {
          if (!isStaticAssetUrl(assetUrl)) return;
          var key = retryKey + ':' + window.location.pathname + ':' + assetUrl;
          if (sessionStorage.getItem(key) === '1') return;
          sessionStorage.setItem(key, '1');
          window.setTimeout(function () {
            window.location.reload();
          }, retryDelayMs);
        }

        window.addEventListener('error', function (event) {
          var target = event && event.target;
          var assetUrl = target && (target.src || target.href);
          retryOnce(assetUrl);
        }, true);

        window.addEventListener('vite:preloadError', function (event) {
          if (event && typeof event.preventDefault === 'function') {
            event.preventDefault();
          }
          retryOnce(event && event.payload && event.payload.href);
        });
      }());
    </script>
    <title>HUB-IT</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
