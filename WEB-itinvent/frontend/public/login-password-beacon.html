<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Сохранение пароля</title>
</head>
<body>
  <form id="beacon-form" method="POST" action="/login/save-password" autocomplete="on">
    <input id="beacon-username" name="username" autocomplete="username">
    <input id="beacon-password" name="password" type="password" autocomplete="current-password">
    <input id="beacon-challenge" name="login_challenge_id" type="hidden">
  </form>
  <script>
    window.addEventListener('message', (event) => {
      if (event.origin !== window.location.origin) return;
      const data = event.data || {};
      if (data.type !== 'safari-password-beacon') return;
      document.getElementById('beacon-username').value = String(data.username || '');
      document.getElementById('beacon-password').value = String(data.password || '');
      document.getElementById('beacon-challenge').value = String(data.loginChallengeId || '');
      document.getElementById('beacon-form').submit();
    });
    window.parent.postMessage({ type: 'safari-password-beacon-ready' }, window.location.origin);
  </script>
</body>
</html>
