[pytest]
# Bot-specific pytest configuration with coverage threshold.

testpaths =
    tests/test_bot_menu_cleanup.py
    tests/test_work_handlers.py

norecursedirs =
    tests/pytest_tmp_run
    .pytest*
    pytest-of-*
    tmp_pytest_*
    _codex_*

python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=bot
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=1

markers =
    asyncio: Асинхронные тесты
    unit: Модульные тесты
    integration: Интеграционные тесты
    slow: Медленные тесты
